services:
  app:
    build:
      context: .
      args:
        VITE_DEFAULT_ROOT: ${VITE_DEFAULT_ROOT:-/workspace}
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_NO_WARNINGS: ${NODE_NO_WARNINGS:-1}
      APP_USER: ${APP_USER:-root}
      HOME: /home/node
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mcp_pm
      REDIS_URL: redis://redis:6379
      FS_BASE_PATH: ${CONTAINER_FS_ROOT:-/workspace}
      FS_TREE_MAX_DIRS: ${FS_TREE_MAX_DIRS:-80}
      FS_MAX_READ_BYTES: ${FS_MAX_READ_BYTES:-1048576}
      STATIC_FRONTEND_DIR: /app/frontend/dist
      TRUST_PROXY: ${TRUST_PROXY:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_BOOTSTRAP_EMAIL: ${AUTH_BOOTSTRAP_EMAIL:-}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:-}
      INVITE_TTL_MS: ${INVITE_TTL_MS:-604800000}
      SESSION_SECRET: ${SESSION_SECRET:-}
      AUTH_SESSION_TTL_MS: ${AUTH_SESSION_TTL_MS:-43200000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      AUTH_LOGIN_RATE_LIMIT_MAX: ${AUTH_LOGIN_RATE_LIMIT_MAX:-10}
      EXPENSIVE_RATE_LIMIT_MAX: ${EXPENSIVE_RATE_LIMIT_MAX:-30}
      CODE_JOB_MAX_ACTIVE: ${CODE_JOB_MAX_ACTIVE:-0}
      ML_JOB_MAX_ACTIVE: ${ML_JOB_MAX_ACTIVE:-0}
      AI_PROVIDER: ${CONTAINER_AI_PROVIDER:-codex_cli}
      CODE_AGENT_PROVIDER: ${CODE_AGENT_PROVIDER:-codex_cli}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      CODE_AI_MODEL: ${CODE_AI_MODEL:-gpt-5.5}
      CODE_JOB_SANDBOX: ${CODE_JOB_SANDBOX:-danger-full-access}
      CODE_JOB_REASONING_EFFORT: ${CODE_JOB_REASONING_EFFORT:-low}
      CODE_JOB_TIMEOUT_MS: ${CODE_JOB_TIMEOUT_MS:-900000}
      CODE_JOB_PREPARE_DEPS: ${CODE_JOB_PREPARE_DEPS:-true}
      CODE_JOB_PREPARE_DEPS_TIMEOUT_MS: ${CODE_JOB_PREPARE_DEPS_TIMEOUT_MS:-180000}
      CODE_JOB_REQUIRE_LEARNED_SKILLS: ${CODE_JOB_REQUIRE_LEARNED_SKILLS:-true}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-true}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-codex_cli}
      IMAGE_CODEX_MODEL: ${IMAGE_CODEX_MODEL:-}
      IMAGE_CODEX_SANDBOX: ${IMAGE_CODEX_SANDBOX:-workspace-write}
      IMAGE_CODEX_REASONING_EFFORT: ${IMAGE_CODEX_REASONING_EFFORT:-low}
      IMAGE_CODEX_TIMEOUT_MS: ${IMAGE_CODEX_TIMEOUT_MS:-900000}
      IMAGE_DEFAULT_SIZE: ${IMAGE_DEFAULT_SIZE:-1024x1024}
      IMAGE_MAX_PER_JOB: ${IMAGE_MAX_PER_JOB:-1}
      JOB_RESUME_ENABLED: ${JOB_RESUME_ENABLED:-true}
      CODE_JOB_MAX_RESUME_ATTEMPTS: ${CODE_JOB_MAX_RESUME_ATTEMPTS:-2}
      ML_JOB_MAX_RESUME_ATTEMPTS: ${ML_JOB_MAX_RESUME_ATTEMPTS:-2}
      JOB_RESUME_STALE_MS: ${JOB_RESUME_STALE_MS:-30000}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_SUMMARY_MODEL: ${CODEX_SUMMARY_MODEL:-gpt-5.3-codex}
      CODEX_SUMMARY_SANDBOX: ${CODEX_SUMMARY_SANDBOX:-danger-full-access}
      CODEX_TIMEOUT_MS: ${CODEX_TIMEOUT_MS:-900000}
      CODEX_BIN: ${CONTAINER_CODEX_BIN:-/app/node_modules/.bin/codex}
      CODEX_HOME: /home/node/.codex
      CLAUDE_BIN: ${CONTAINER_CLAUDE_BIN:-/app/node_modules/.bin/claude}
      CLAUDE_CONFIG_DIR: /home/node/.claude
      CLAUDE_MODEL: ${CLAUDE_MODEL:-sonnet}
      CLAUDE_PERMISSION_MODE: ${CLAUDE_PERMISSION_MODE:-bypassPermissions}
      CLAUDE_MAX_TURNS: ${CLAUDE_MAX_TURNS:-20}
      ML_MIND_ENABLED: ${ML_MIND_ENABLED:-true}
      ML_AI_PROVIDER: ${ML_AI_PROVIDER:-codex_cli}
      ML_EMBEDDING_PROVIDER: ${ML_EMBEDDING_PROVIDER:-local_hash}
      ML_EMBEDDING_MODEL: ${ML_EMBEDDING_MODEL:-text-embedding-3-small}
      ML_SKILL_MODEL: ${ML_SKILL_MODEL:-gpt-5.5}
      ML_MAX_REPO_MB: ${ML_MAX_REPO_MB:-120}
      ML_MAX_FILE_BYTES: ${ML_MAX_FILE_BYTES:-200000}
      ML_CHUNK_SIZE: ${ML_CHUNK_SIZE:-1800}
      ML_CHUNK_OVERLAP: ${ML_CHUNK_OVERLAP:-250}
      ML_RETRIEVAL_LIMIT: ${ML_RETRIEVAL_LIMIT:-8}
      ML_RUNTIME_SELECTOR: ${ML_RUNTIME_SELECTOR:-fast_cached}
      ML_SELECTOR_TIMEOUT_MS: ${ML_SELECTOR_TIMEOUT_MS:-2500}
      ML_MIND_CACHE_TTL_MS: ${ML_MIND_CACHE_TTL_MS:-86400000}
      ML_MIND_MAX_RUNTIME_SKILLS: ${ML_MIND_MAX_RUNTIME_SKILLS:-3}
      ML_SCRAPER_MAX_PAGES: ${ML_SCRAPER_MAX_PAGES:-25}
      ML_SCRAPER_MAX_DEPTH: ${ML_SCRAPER_MAX_DEPTH:-2}
      ML_SCRAPER_MAX_TOTAL_MB: ${ML_SCRAPER_MAX_TOTAL_MB:-30}
      ML_SCRAPER_TIMEOUT_MS: ${ML_SCRAPER_TIMEOUT_MS:-15000}
      ML_ALLOW_PRIVATE_NETWORK_FETCHES: ${ML_ALLOW_PRIVATE_NETWORK_FETCHES:-false}
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_HOST_PORT:-4000}:4000"
    volumes:
      - type: bind
        source: ${HOST_WORKSPACE_ROOT:-./workspace}
        target: ${CONTAINER_FS_ROOT:-/workspace}
      - type: bind
        source: ${CODEX_HOME_HOST:-./.codex-host}
        target: /home/node/.codex
      - type: bind
        source: ${CLAUDE_HOME_HOST:-./.claude-host}
        target: /home/node/.claude

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mcp_pm
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_pm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  redisdata:
